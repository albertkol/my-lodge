name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --no-sources --group dev

      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run djlint templates/ --lint --extension jinja2
      - run: uv run ty check
